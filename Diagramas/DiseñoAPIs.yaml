openapi: 3.0.3
info:
  title: API - Sistema de Gestión Tributaria Integral
  description: Contrato de diseño de APIs del Sistema de Gestión Tributaria Integral. Incluye los módulos de comunicación (Chat, Email, WhatsApp, Calendar) y los recursos principales del negocio (Clientes, Liquidaciones, Comprobantes).
  version: 1.0.0
servers:
  - url: /api
    description: Servidor Local / Base de Rutas en Next.js

tags:
  - name: Chat
    description: Canales de mensajería en tiempo real dentro de la plataforma web. Mapea con app/api/mensajes/
  - name: Email
    description: Envío de resúmenes impositivos y recepción de respuestas de clientes. Mapea con app/api/emails/
  - name: WhatsApp
    description: Recepción de mensajes entrantes iniciados por el cliente desde su celular. Mapea con app/api/whatsapp/
  - name: Calendar
    description: Sincronización y gestión de turnos con Google Calendar mapeados sobre la tabla física 'turno'. Mapea con app/api/turnos/
  - name: Clientes
    description: Gestión de clientes del estudio contable. Alta, baja, modificación y consulta de datos. Mapea con app/api/clientes/
  - name: Liquidaciones
    description: Gestión de liquidaciones impositivas de los clientes del estudio. Mapea con app/api/liquidaciones/
  - name: Comprobantes
    description: Gestión de comprobantes asociados a liquidaciones abonadas. Mapea con app/api/comprobantes/

paths:
  # =========================================================================
  # 1. MODULO CHAT (Ruta física: app/api/mensajes/token/route.ts)
  # =========================================================================
  /mensajes/token:
    get:
      summary: Obtener token de Stream Chat
      description: Genera y devuelve un token de autenticación de Stream Chat para el usuario autenticado con Clerk. El frontend lo usa para conectarse al canal privado con su contador o cliente asignado. El historial y tiempo real son gestionados íntegramente por Stream Chat (sin persistencia en Neon DB).
      tags:
        - Chat
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token generado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiJ9..."
                  userId:
                    type: string
                    example: "cuil_20123456781"
                  nombre:
                    type: string
                    example: "María García"
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: El usuario autenticado no tiene registro en la base de datos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # 2. MODULO EMAIL
  # =========================================================================
  /emails/notificaciones: # Ruta física: app/api/emails/notificaciones/route.js
    post:
      summary: Enviar correo electrónico saliente al cliente
      description: Despacha una notificación formal desde el estudio hacia el email registrado del cliente.
      tags:
        - Email
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - emailDestinatario
                - asunto
                - cuerpo
              properties:
                emailDestinatario:
                  type: string
                  format: email
                  example: cliente@estudio.com
                asunto:
                  type: string
                  example: "Resumen Impositivo Mensual"
                cuerpo:
                  type: string
                  example: "Estimado cliente, se encuentra disponible su liquidación."
      responses:
        '202':
          description: Correo aceptado en la cola del proveedor externo gratuito.

  /emails/entrantes: # Ruta física: app/api/emails/entrantes/route.js
    post:
      summary: Recibir respuesta de correo electrónico (Webhook)
      description: Recibe la respuesta del cliente. El backend busca el remitente en la columna 'email' de la tabla 'usuario' para identificarlo y notificar al contador en la interfaz.
      tags:
        - Email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - deEmail
                - asunto
                - textoCuerpo
              properties:
                deEmail:
                  type: string
                  format: email
                  example: cliente@estudio.com
                asunto:
                  type: string
                  example: "Re: Resumen Impositivo"
                textoCuerpo:
                  type: string
                  example: "Hola, muchas gracias. Mañana realizo el pago."
      responses:
        '200':
          description: Respuesta de correo procesada y redirigida exitosamente.
        '404':
          description: El email remitente no corresponde a ningún usuario registrado en el sistema.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # 3. MODULO WHATSAPP
  # =========================================================================
  /whatsapp/webhook: # Ruta física: app/api/whatsapp/webhook/route.js
    post:
      summary: Recibir mensaje entrante de WhatsApp (Webhook de Meta)
      description: Meta invoca esta ruta pública cuando el cliente inicia una conversación desde su celular. El backend toma el 'telefonoRemitente' y lo mapea con 'usuario.telefono' para identificarlo y notificar al contador en tiempo real.
      tags:
        - WhatsApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - telefonoRemitente
                - texto
              properties:
                telefonoRemitente:
                  type: integer
                  example: 542914555555
                  description: Clave de búsqueda para matchear con el campo 'telefono' de la tabla 'usuario'.
                texto:
                  type: string
                  example: "Hola! ¿Me podés pasar el link de nuevo?"
      responses:
        '200':
          description: Evento recibido y despachado al frontend del contador en tiempo real.
        '404':
          description: El teléfono remitente no pertenece a ningún usuario activo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # 4. MODULO GOOGLE CALENDAR (Ruta física: app/api/turnos/route.js)
  # =========================================================================
  /turnos:
    post:
      summary: Agendar y sincronizar turno en Google Calendar
      description: Crea un evento en Google Calendar reflejando la inserción correspondiente en la tabla física 'turno'.
      tags:
        - Calendar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cuilCliente
                - cuilContador
                - fecha
                - hora
              properties:
                cuilCliente:
                  type: integer
                  example: 20123456781
                  description: Atributo 'cuil_cliente' de la tabla 'turno'.
                cuilContador:
                  type: integer
                  example: 27123456789
                  description: Atributo 'cuil_contador' de la tabla 'turno'.
                fecha:
                  type: string
                  format: date
                  example: "2026-06-15"
                  description: Atributo 'fecha' (DATE) de la tabla 'turno'.
                hora:
                  type: string
                  example: "10:00:00"
                  description: Atributo 'hora' (TIME) de la tabla 'turno'.
      responses:
        '201':
          description: Sincronización con Google Calendar realizada con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  estadoSincronizacion:
                    type: string
                    example: "SYNCHRONIZED"
        '409':
          description: Conflicto de disponibilidad (Clave primaria duplicada en la tabla 'turno').
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Eliminar turno de Google Calendar por clave compuesta
      description: Cancela y remueve el evento en Google Calendar utilizando los atributos de la PK compuesta de la tabla 'turno' enviados por Query Parameters.
      tags:
        - Calendar
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cuilCliente
          required: true
          schema:
            type: integer
        - in: query
          name: cuilContador
          required: true
          schema:
            type: integer
        - in: query
          name: fecha
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: hora
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Evento eliminado satisfactoriamente de Google Calendar. Sin cuerpo de respuesta.
        '404':
          description: El turno especificado con esa clave compuesta no existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # 5. MODULO CLIENTES (Ruta física: app/api/clientes/route.js)
  # =========================================================================
  /clientes:
    get:
      summary: Listar clientes del estudio contable
      description: Retorna el listado de clientes asociados al contador autenticado. Opcionalmente filtra por término de búsqueda en nombre, apellido, email o CUIL.
      tags:
        - Clientes
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: busqueda
          required: false
          schema:
            type: string
          description: Término de búsqueda para filtrar por nombre, apellido, email o CUIL.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
          description: Desplazamiento para paginación.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 20
          description: Cantidad máxima de resultados.
      responses:
        '200':
          description: Listado de clientes obtenido exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cliente'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Registrar un nuevo cliente en el estudio
      description: Da de alta un nuevo cliente y lo asocia al contador autenticado y a su estudio contable.
      tags:
        - Clientes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteInput'
      responses:
        '201':
          description: Cliente registrado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '400':
          description: Datos inválidos — CUIL con formato incorrecto o campos obligatorios faltantes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflicto — ya existe un cliente con ese CUIL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /clientes/{cuil}:
    get:
      summary: Obtener detalle de un cliente por CUIL
      description: Retorna la información completa de un cliente específico del estudio.
      tags:
        - Clientes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cuil
          required: true
          schema:
            type: integer
          description: CUIL del cliente (11 dígitos sin guiones).
      responses:
        '200':
          description: Datos del cliente obtenidos exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No existe un cliente con ese CUIL en el estudio.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Actualizar datos de un cliente
      description: Modifica los datos de contacto (nombre, apellido, email, teléfono) de un cliente existente.
      tags:
        - Clientes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cuil
          required: true
          schema:
            type: integer
          description: CUIL del cliente a actualizar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteUpdate'
      responses:
        '200':
          description: Cliente actualizado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '400':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Eliminar un cliente del estudio
      description: Desvincula o elimina un cliente del estudio contable.
      tags:
        - Clientes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: cuil
          required: true
          schema:
            type: integer
          description: CUIL del cliente a eliminar.
      responses:
        '204':
          description: Cliente eliminado exitosamente. Sin cuerpo de respuesta.
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # 6. MODULO LIQUIDACIONES (Ruta física: app/api/liquidaciones/route.js)
  # =========================================================================
  /liquidaciones:
    get:
      summary: Listar liquidaciones impositivas
      description: Retorna el listado de liquidaciones aplicando filtros opcionales por cliente, impuesto, estado o período fiscal.
      tags:
        - Liquidaciones
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cuilCliente
          required: false
          schema:
            type: integer
          description: CUIL del cliente para filtrar sus liquidaciones.
        - in: query
          name: idImpuesto
          required: false
          schema:
            type: integer
          description: Identificador del impuesto para filtrar.
        - in: query
          name: estado
          required: false
          schema:
            type: string
            enum:
              - PENDIENTE
              - PAGADO
          description: Estado de la liquidación.
        - in: query
          name: periodoDesde
          required: false
          schema:
            type: string
            format: date
          description: Inicio del período fiscal (ISO 8601).
        - in: query
          name: periodoHasta
          required: false
          schema:
            type: string
            format: date
          description: Fin del período fiscal (ISO 8601).
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
          description: Desplazamiento para paginación.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 20
          description: Cantidad máxima de resultados.
      responses:
        '200':
          description: Listado de liquidaciones obtenido exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Liquidacion'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Crear una nueva liquidación impositiva
      description: Genera una liquidación para un cliente en un período fiscal determinado, con estado inicial PENDIENTE.
      tags:
        - Liquidaciones
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiquidacionInput'
      responses:
        '201':
          description: Liquidación creada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Liquidacion'
        '400':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: El cliente o impuesto especificado no existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /liquidaciones/{numeroBoleta}:
    get:
      summary: Obtener detalle de una liquidación por número de boleta
      description: Retorna la información completa de una liquidación específica.
      tags:
        - Liquidaciones
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: numeroBoleta
          required: true
          schema:
            type: integer
          description: Número de boleta (ID autoincremental de la liquidación).
      responses:
        '200':
          description: Datos de la liquidación obtenidos exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Liquidacion'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Liquidación no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Actualizar una liquidación
      description: Modifica el importe y/o el estado de una liquidación existente.
      tags:
        - Liquidaciones
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: numeroBoleta
          required: true
          schema:
            type: integer
          description: Número de boleta de la liquidación a actualizar.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiquidacionUpdate'
      responses:
        '200':
          description: Liquidación actualizada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Liquidacion'
        '400':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Liquidación no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Eliminar una liquidación
      description: Elimina el registro de liquidación del sistema.
      tags:
        - Liquidaciones
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: numeroBoleta
          required: true
          schema:
            type: integer
          description: Número de boleta de la liquidación a eliminar.
      responses:
        '204':
          description: Liquidación eliminada exitosamente. Sin cuerpo de respuesta.
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Liquidación no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # 7. MODULO COMPROBANTES (Ruta física: app/api/comprobantes/route.js)
  # =========================================================================
  /comprobantes:
    get:
      summary: Listar comprobantes
      description: Retorna el listado de comprobantes registrados, con filtro opcional por liquidación asociada.
      tags:
        - Comprobantes
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: numeroBoletaLiquidacion
          required: false
          schema:
            type: integer
          description: Número de boleta de la liquidación asociada para filtrar.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            default: 0
          description: Desplazamiento para paginación.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 20
          description: Cantidad máxima de resultados.
      responses:
        '200':
          description: Listado de comprobantes obtenido exitosamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comprobante'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Registrar un comprobante asociado a una liquidación
      description: Crea un comprobante de pago y lo vincula a una liquidación existente (relación 1:1).
      tags:
        - Comprobantes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComprobanteInput'
      responses:
        '201':
          description: Comprobante registrado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comprobante'
        '400':
          description: Datos inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: La liquidación especificada no existe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: La liquidación ya tiene un comprobante asociado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /comprobantes/{numeroBoleta}:
    get:
      summary: Obtener detalle de un comprobante por número de boleta
      description: Retorna la información completa de un comprobante específico.
      tags:
        - Comprobantes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: numeroBoleta
          required: true
          schema:
            type: integer
          description: Número de boleta del comprobante (ID autoincremental).
      responses:
        '200':
          description: Datos del comprobante obtenidos exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comprobante'
        '401':
          description: Token JWT de Clerk inválido o ausente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Comprobante no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

# =========================================================================
# COMPONENTES REUTILIZABLES
# =========================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: USUARIO_NO_REGISTRADO
              description: Código de error semántico en SNAKE_UPPER_CASE.
            message:
              type: string
              example: "El CUIL, correo o teléfono ingresado no corresponde a ningún registro activo."

    Cliente:
      type: object
      properties:
        cuil:
          type: integer
          example: 20123456781
          description: CUIL del cliente (PK, 11 dígitos).
        nombre:
          type: string
          example: Juan
        apellido:
          type: string
          example: Pérez
        email:
          type: string
          format: email
          example: juan.perez@email.com
        telefono:
          type: string
          example: "542914555555"
        contador:
          type: integer
          example: 27123456789
          description: CUIL del contador asignado (FK a contador).
        idEstudio:
          type: integer
          example: 1
          description: Identificador del estudio contable (FK a estudio_contable).

    ClienteInput:
      type: object
      required:
        - cuil
